<template id="tpl-order-form">

<div class="card">

    <div class="card-header">

        <h2>Form Delivery Order</h2>

        <p>Form input delivery order bahan ajar</p>

    </div>

    <form
        @submit.prevent="submitDO"
        class="form-do">

        <div class="form-grid">

            <div class="form-group">

                <label>Nomor DO</label>

                <input
                    type="text"
                    v-model="newDO.nomorDO"
                    disabled>

            </div>

            <div class="form-group">

                <label>NIM</label>

                <input
                    type="text"
                    v-model="newDO.nim"
                    placeholder="Masukkan NIM">

            </div>

            <div class="form-group">

                <label>Nama Mahasiswa</label>

                <input
                    type="text"
                    v-model="newDO.nama"
                    placeholder="Masukkan Nama">

            </div>

            <div class="form-group">

                <label>Ekspedisi</label>

                <select
                    v-model="newDO.ekspedisi">

                    <option
                        value=""
                        disabled>

                        Pilih Ekspedisi

                    </option>

                    <option
                        v-for="(exp,i) in pengirimanList"
                        :key="i"
                        :value="exp">

                        {{ exp.kode }} -
                        {{ exp.nama }}

                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Paket Bahan Ajar</label>

                <select
                    v-model="newDO.paket">

                    <option
                        value=""
                        disabled>

                        Pilih Paket

                    </option>

                    <option
                        v-for="(p,i) in paketList"
                        :key="i"
                        :value="p.kode">

                        {{ p.kode }} -
                        {{ p.nama }}

                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Tanggal Kirim</label>

                <input
                    type="date"
                    v-model="newDO.tanggalKirim">

            </div>

        </div>

        <!-- DETAIL PAKET -->

        <div
            v-if="selectedPaket"
            class="paket-detail">

            <div class="paket-header">

                <h4>Detail Isi Paket</h4>

                <span class="harga-paket">

                    Rp
                    {{ selectedPaket.harga.toLocaleString('id-ID') }}

                </span>

            </div>

            <ol>

                <li
                    v-for="(item,i) in selectedPaket.isi"
                    :key="i">

                    {{ item }}

                </li>

            </ol>

        </div>

        <div class="button-area">

            <button
                type="submit"
                class="submit-btn">

                <i class="fa-solid fa-plus"></i>

                Tambah DO Baru

            </button>

        </div>

    </form>

</div>

</template>
